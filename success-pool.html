<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In | Royal's Cigar Lounge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif; background: #0A0A0A; color: #F5F0E8;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 2rem;
  }
  .check { width: 64px; height: 64px; border: 2px solid #D4A843; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;
    color: #D4A843; font-size: 2rem; font-weight: 700; }
  h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; }
  h1 em { color: #D4A843; font-style: italic; }
  p { color: #999; font-weight: 300; font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6; }
  a { display: inline-block; background: #D4A843; color: #0A0A0A; padding: 0.9rem 2.2rem;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 0.15em;
    text-decoration: none; transition: all 0.3s; }
  a:hover { background: #E8C96A; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,67,0.25); }
</style>
</head>
<body>
<div>
  <div class="check">&#10003;</div>
  <h1>You're in the <em>Bracket.</em></h1>
  <p>See you Monday night. Bring your A-game.</p>
  <a href="/">Back to Royal's</a>
</div>
</body>
</html>
